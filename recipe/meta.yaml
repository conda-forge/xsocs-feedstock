{% set name = "xsocs" %}
{% set version = "2026.2.0" %}

package:
  name: xsocs-split
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/xsocs-{{ version }}.tar.gz
  sha256: 77470a2deb2567724c5c660bc71b1560752a88fa4f66f49dbfe96cce3f893f77

build:
  number: 0

outputs:
  - name: xsocs-base
    build:
      noarch: python
      script: python -m pip install --no-deps --no-build-isolation -vv .
      entry_points:
        - xsocs = xsocs.__main__:main

    requirements:
      host:
        - python {{ python_min }}
        - wheel
        - setuptools
        - pip
      run:
        - python >={{ python_min }}
        - numpy
        - h5py
        - fabio
        - silx-base >=1.0.0
        - xrayutilities
        - scipy
        - setuptools
        - packaging

    test:
      imports:
        - xsocs
      commands:
        - pip check
        - xsocs --help
        - python -c "import sys, xsocs.test; sys.exit(xsocs.test.run_tests(verbosity=3))"
      requires:
        - pip

  - name: xsocs
    build:
      noarch: python
    requirements:
      run:
        - {{ pin_subpackage('xsocs-base', exact=True) }}
        - silx >=1.0.0
        - pyopengl
        - matplotlib-base
        - pyqt
    test:
      imports:
        - xsocs
      commands:
        - xsocs gui --help
        - pip check
      requires:
        - pip
        - python {{ python_min }}

about:
  home: https://gitlab.esrf.fr/kmap/xsocs
  summary: Xray Strain Orientation Calculation Software
  license: MIT
  license_file: LICENSE
  doc_url: https://kmap.gitlab-pages.esrf.fr/xsocs/
  dev_url: https://gitlab.esrf.fr/kmap/xsocs

extra:
  recipe-maintainers:
    - t20100
  feedstock-name: xsocs
